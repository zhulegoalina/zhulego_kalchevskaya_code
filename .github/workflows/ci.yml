name: CI for Autopark

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev gcc make
      
    - name: Build
      run: make
      
    - name: Test
      run: make test
